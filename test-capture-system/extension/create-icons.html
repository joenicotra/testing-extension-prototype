<!DOCTYPE html>
<html>
<head>
  <title>Create Extension Icons</title>
</head>
<body>
  <h2>Right-click each canvas and save as the specified filename:</h2>

  <h3>icon16.png</h3>
  <canvas id="icon16" width="16" height="16"></canvas>

  <h3>icon48.png</h3>
  <canvas id="icon48" width="48" height="48"></canvas>

  <h3>icon128.png</h3>
  <canvas id="icon128" width="128" height="128"></canvas>

  <h3>icon16-recording.png</h3>
  <canvas id="icon16r" width="16" height="16"></canvas>

  <h3>icon48-recording.png</h3>
  <canvas id="icon48r" width="48" height="48"></canvas>

  <h3>icon128-recording.png</h3>
  <canvas id="icon128r" width="128" height="128"></canvas>

  <script>
    function drawIcon(canvasId, size, recording = false) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');

      const gradient = ctx.createLinearGradient(0, 0, size, size);
      if (recording) {
        gradient.addColorStop(0, '#ff4458');
        gradient.addColorStop(1, '#ff6b6b');
      } else {
        gradient.addColorStop(0, '#667eea');
        gradient.addColorStop(1, '#764ba2');
      }

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      ctx.fillStyle = 'white';
      ctx.font = `bold ${size * 0.5}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('T', size / 2, size / 2);

      if (recording) {
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(size * 0.8, size * 0.2, size * 0.08, 0, 2 * Math.PI);
        ctx.fill();
      }
    }

    drawIcon('icon16', 16);
    drawIcon('icon48', 48);
    drawIcon('icon128', 128);
    drawIcon('icon16r', 16, true);
    drawIcon('icon48r', 48, true);
    drawIcon('icon128r', 128, true);
  </script>
</body>
</html>
