<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 320px;
      padding: 0;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .container {
      background: white;
      margin: 10px;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .header {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
      gap: 10px;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #ff4458, #ff6b6b);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 18px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      color: #2d3748;
    }

    .status {
      padding: 15px;
      background: #f7fafc;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .status-label {
      font-size: 12px;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .status-value {
      font-size: 16px;
      font-weight: 600;
      color: #2d3748;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #cbd5e0;
    }

    .status-indicator.recording {
      background: #ff4458;
      animation: pulse 1.5s infinite;
    }

    .status-indicator.connected {
      background: #48bb78;
    }

    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
      100% { opacity: 1; transform: scale(1); }
    }

    .controls {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-start {
      background: linear-gradient(135deg, #48bb78, #38a169);
      color: white;
    }

    .btn-start:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 5px 15px rgba(72, 187, 120, 0.3);
    }

    .btn-stop {
      background: linear-gradient(135deg, #ff4458, #ff6b6b);
      color: white;
    }

    .btn-stop:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 5px 15px rgba(255, 68, 88, 0.3);
    }

    .btn-open {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .btn-open:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .action-count {
      margin-top: 15px;
      padding: 10px;
      background: #edf2f7;
      border-radius: 8px;
      font-size: 14px;
      color: #4a5568;
      text-align: center;
    }

    .action-count strong {
      color: #2d3748;
      font-weight: 600;
    }

    .connection-status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .connection-status.connected {
      background: #c6f6d5;
      color: #22543d;
    }

    .connection-status.disconnected {
      background: #fed7d7;
      color: #742a2a;
    }

    .divider {
      height: 1px;
      background: #e2e8f0;
      margin: 15px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">T</div>
      <h1>Test Capture</h1>
    </div>

    <div class="status">
      <div class="status-label">Recording Status</div>
      <div class="status-value">
        <span class="status-indicator" id="statusIndicator"></span>
        <span id="statusText">Not Recording</span>
      </div>
    </div>

    <div class="controls">
      <button id="startBtn" class="btn btn-start">Start</button>
      <button id="stopBtn" class="btn btn-stop" disabled>Stop</button>
    </div>

    <div class="divider"></div>

    <button id="openDashboard" class="btn btn-open">Open Dashboard</button>

    <div id="actionCount" class="action-count" style="display: none;">
      <strong id="actionNumber">0</strong> actions captured
    </div>

    <div id="connectionStatus" class="connection-status disconnected">
      <span class="status-indicator"></span>
      <span id="connectionText">Connecting to server...</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
